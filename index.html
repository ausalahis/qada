<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Qada">
<title>Qada Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #13131a;
    --bg3: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede6;
    --muted: rgba(240,237,230,0.45);
    --hint: rgba(240,237,230,0.22);
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --green: #4caf82;
    --green-dim: rgba(76,175,130,0.15);
    --fajr: #7eb8e8;
    --dhuhr: #7ec4a8;
    --asr: #e8c97a;
    --maghrib: #e88fa0;
    --isha: #a78be8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; min-height: 100dvh; }

  header {
    padding: env(safe-area-inset-top, 20px) 20px 0;
    padding-top: calc(env(safe-area-inset-top, 20px) + 16px);
    text-align: center;
  }
  .arabic { font-family: 'Amiri', serif; font-size: 22px; color: var(--gold); letter-spacing: 0.02em; margin-bottom: 2px; }
  .title { font-size: 13px; font-weight: 300; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

  .total-ring {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px 20px 12px;
  }
  .ring-wrap { position: relative; width: 130px; height: 130px; }
  .ring-wrap svg { width: 130px; height: 130px; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border2); stroke-width: 8; }
  .ring-fill { fill: none; stroke: var(--gold); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
  .ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-pct { font-size: 26px; font-weight: 500; color: var(--text); line-height: 1; }
  .ring-label { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: 0.06em; }
  .total-sub { font-size: 12px; color: var(--hint); margin-top: 8px; }

  .prayers { flex: 1; padding: 0 16px 100px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }

  .prayer-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .prayer-card.just-logged { border-color: var(--gold-dim); animation: pulse 0.4s ease; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.012)} }

  .prayer-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .prayer-name { font-size: 16px; font-weight: 500; }
  .prayer-dot { width: 8px; height: 8px; border-radius: 50%; }
  .prayer-meta { font-size: 11px; color: var(--muted); text-align: right; line-height: 1.5; }

  .bar-track { height: 3px; background: var(--border2); border-radius: 99px; overflow: hidden; margin-bottom: 12px; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

  .prayer-stats { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .stat { text-align: center; }
  .stat-val { font-size: 18px; font-weight: 500; color: var(--text); }
  .stat-key { font-size: 10px; color: var(--hint); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }

  .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn {
    padding: 10px 0; border-radius: 10px; border: 1px solid var(--border2);
    background: var(--bg3); color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400; cursor: pointer; transition: all 0.15s;
    -webkit-user-select: none;
  }
  .btn:active { transform: scale(0.96); background: var(--border); }
  .btn-main { grid-column: 1 / -1; background: var(--gold-dim); border-color: rgba(201,168,76,0.3); color: var(--gold-light); font-weight: 500; }
  .btn-main:active { background: rgba(201,168,76,0.25); }

  .done-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--green-dim); border: 1px solid rgba(76,175,130,0.2);
    color: var(--green); font-size: 11px; padding: 3px 10px; border-radius: 99px;
    margin-top: 4px;
  }

  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 20px env(safe-area-inset-bottom, 16px);
    background: linear-gradient(transparent, var(--bg) 40%);
    text-align: center;
  }
  .reset-btn { background: none; border: none; font-size: 11px; color: var(--hint); cursor: pointer; font-family: 'DM Sans', sans-serif; }
</style>
</head>
<body>

<header>
  <div class="arabic">قضاء الصلوات</div>
  <div class="title">Qada Prayer Tracker</div>
</header>

<div class="total-ring">
  <div class="ring-wrap">
    <svg viewBox="0 0 130 130">
      <circle class="ring-bg" cx="65" cy="65" r="56"/>
      <circle class="ring-fill" id="ring" cx="65" cy="65" r="56" stroke-dasharray="351.86" stroke-dashoffset="351.86"/>
    </svg>
    <div class="ring-text">
      <div class="ring-pct" id="ring-pct">0%</div>
      <div class="ring-label">COMPLETE</div>
    </div>
  </div>
  <div class="total-sub" id="total-sub">0 / 43,435 rakaat</div>
</div>

<div class="prayers" id="prayers"></div>

<footer>
  <button class="reset-btn" onclick="confirmReset()">Reset all progress</button>
</footer>

<script>
const PRAYERS = [
  { id:'fajr',    name:'Fajr',    ar:'الفجر',    rakaat:2, color:'#7eb8e8' },
  { id:'dhuhr',   name:'Dhuhr',   ar:'الظهر',    rakaat:4, color:'#7ec4a8' },
  { id:'asr',     name:'Asr',     ar:'العصر',    rakaat:4, color:'#e8c97a' },
  { id:'maghrib', name:'Maghrib', ar:'المغرب',   rakaat:3, color:'#e88fa0' },
  { id:'isha',    name:'Isha',    ar:'العشاء',   rakaat:4, color:'#a78be8' },
];
const YEARS = 7, DAYS = YEARS * 365;
const totals = {};
PRAYERS.forEach(p => totals[p.id] = DAYS * p.rakaat);
const GRAND = Object.values(totals).reduce((a,b)=>a+b,0);

function load() {
  try { return JSON.parse(localStorage.getItem('qada_v2') || '{}'); } catch { return {}; }
}
function save(s) { try { localStorage.setItem('qada_v2', JSON.stringify(s)); } catch {} }

let state = load();
PRAYERS.forEach(p => { if (!state[p.id]) state[p.id] = 0; });

function fmt(n) { return n.toLocaleString(); }

function render() {
  let totalDone = PRAYERS.reduce((s,p) => s + (state[p.id]||0), 0);
  const pct = Math.min(100, (totalDone / GRAND) * 100);
  const circ = 2 * Math.PI * 56;
  document.getElementById('ring').style.strokeDashoffset = circ * (1 - pct/100);
  document.getElementById('ring-pct').textContent = pct.toFixed(1) + '%';
  document.getElementById('total-sub').textContent = fmt(totalDone) + ' / ' + fmt(GRAND) + ' rakaat';

  const container = document.getElementById('prayers');
  container.innerHTML = '';

  PRAYERS.forEach(p => {
    const done = state[p.id] || 0;
    const total = totals[p.id];
    const left = total - done;
    const ppct = Math.min(100, (done/total)*100);
    const complete = done >= total;

    const card = document.createElement('div');
    card.className = 'prayer-card';
    card.id = 'card-' + p.id;
    card.innerHTML = `
      <div class="prayer-head">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="prayer-dot" style="background:${p.color}"></div>
          <span class="prayer-name">${p.name}</span>
          <span style="font-family:'Amiri',serif;font-size:16px;color:${p.color};opacity:0.7">${p.ar}</span>
          ${complete ? '<span class="done-badge">✓ Done</span>' : ''}
        </div>
        <div class="prayer-meta">
          ${p.rakaat} rakaat<br>${fmt(total)} total
        </div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${ppct}%;background:${p.color}"></div></div>
      <div class="prayer-stats">
        <div class="stat"><div class="stat-val">${fmt(done)}</div><div class="stat-key">Prayed</div></div>
        <div class="stat"><div class="stat-val">${ppct.toFixed(1)}%</div><div class="stat-key">Done</div></div>
        <div class="stat"><div class="stat-val">${fmt(left)}</div><div class="stat-key">Left</div></div>
      </div>
      ${!complete ? `
      <div class="btns">
        <button class="btn btn-main" onclick="log('${p.id}','prayer')">+ 1 prayer (${p.rakaat} rakaat)</button>
        <button class="btn" onclick="log('${p.id}','five')">+ 5 prayers</button>
        <button class="btn" onclick="log('${p.id}','ten')">+ 10 prayers</button>
      </div>` : `<div style="text-align:center;font-size:13px;color:var(--green);padding:4px 0">Alhamdulillah — all ${p.name} prayers complete 🤲</div>`}
    `;
    container.appendChild(card);
  });
}

function log(id, type) {
  const p = PRAYERS.find(x => x.id === id);
  const total = totals[id];
  const amounts = { prayer: p.rakaat, five: p.rakaat*5, ten: p.rakaat*10 };
  state[id] = Math.min(total, (state[id]||0) + amounts[type]);
  save(state);
  render();
  const card = document.getElementById('card-'+id);
  card.classList.add('just-logged');
  setTimeout(() => card.classList.remove('just-logged'), 500);
}

function confirmReset() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    PRAYERS.forEach(p => state[p.id] = 0);
    save(state); render();
  }
}

render();
</script>
</body>
</html>
